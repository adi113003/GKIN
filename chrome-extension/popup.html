<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GKIN Navigator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ── Airbnb-style system — white canvas, single Rausch accent, Inter ── */
:root {
  --bg:        #ffffff;
  --surface:   #f7f7f7;
  --surface-2: #f2f2f2;
  --ink:       #222222;
  --ink-2:     #3f3f3f;
  --ink-3:     #6a6a6a;
  --ink-4:     #929292;
  --border:    #ebebeb;
  --border-2:  #dddddd;
  --rausch:        #ff385c;
  --rausch-active: #e00b41;
  --supported:     #15633A;
  --contradicted:  #9B1C2E;
  --insufficient:  #6a6a6a;
  --shadow: rgba(0,0,0,0.02) 0 0 0 1px, rgba(0,0,0,0.04) 0 2px 6px 0, rgba(0,0,0,0.1) 0 4px 8px 0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { width: 400px; }
body {
  background: var(--bg); color: var(--ink);
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  font-size: 14px; line-height: 1.6;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}

/* ── Header ── */
.header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--bg);
}
.brand {
  font-size: 18px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink);
  display: flex; align-items: baseline; gap: 8px;
}
.brand .dot { color: var(--rausch); }
.brand .brand-sub { font-size: 12px; font-weight: 500; letter-spacing: 0; color: var(--ink-3); }
.header-right { display: flex; align-items: center; gap: 8px; }
.icon-btn {
  background: transparent; border: 1px solid var(--border-2);
  color: var(--ink-3); font-size: 15px; cursor: pointer;
  padding: 6px 9px; border-radius: 9999px; line-height: 1; transition: all 0.15s;
}
.icon-btn:hover { color: var(--ink); border-color: var(--ink-3); background: var(--surface); }

/* ── Server settings ── */
.settings-box {
  display: none; padding: 14px 16px 16px;
  border-bottom: 1px solid var(--border); background: var(--surface);
}
.settings-box.show { display: block; }
.field-label { font-size: 12px; color: var(--ink-3); margin-bottom: 6px; font-weight: 500; }
.settings-input {
  width: 100%; background: #fff; border: 1px solid var(--border-2);
  border-radius: 8px; color: var(--ink); padding: 10px 12px;
  font-size: 13px; font-family: inherit;
}
.settings-input:focus { outline: none; border-color: var(--ink); }
.settings-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-ghost {
  flex: 1; padding: 9px; font-size: 13px; font-weight: 600;
  background: #fff; color: var(--ink);
  border: 1px solid var(--border-2); border-radius: 8px;
  cursor: pointer; transition: all 0.15s;
}
.btn-ghost:hover { background: var(--surface); }

/* ── Auth ── */
.section { padding: 16px; }
.auth-label { font-size: 18px; color: var(--ink); margin-bottom: 14px; font-weight: 700; letter-spacing: -0.01em; }
.auth-field { margin-bottom: 10px; }
.auth-field input {
  width: 100%; background: #fff; border: 1px solid var(--border-2);
  border-radius: 8px; color: var(--ink); padding: 11px 12px;
  font-size: 14px; font-family: inherit; transition: border-color 0.15s;
}
.auth-field input:focus { outline: none; border-color: var(--ink); }
.auth-field input::placeholder { color: var(--ink-4); }
.btn-primary {
  width: 100%; padding: 12px; font-size: 15px; font-weight: 600;
  background: var(--rausch); color: #fff; border: none;
  border-radius: 9999px; cursor: pointer; letter-spacing: 0;
  transition: background 0.15s;
}
.btn-primary:hover:not(:disabled) { background: var(--rausch-active); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.auth-switch { text-align: center; margin-top: 12px; font-size: 13px; color: var(--ink-3); }
.auth-switch a { color: var(--rausch); cursor: pointer; text-decoration: none; font-weight: 600; }
.auth-switch a:hover { text-decoration: underline; }
.auth-error {
  background: #fbeaec; color: var(--contradicted);
  padding: 9px 12px; border-radius: 8px; font-size: 13px;
  margin-top: 10px; display: none; border-left: 3px solid var(--contradicted);
}
.auth-error.show { display: block; }

/* ── Logged-in header row ── */
.user-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.user-info { font-size: 13px; color: var(--ink-3); }
.user-info strong { color: var(--ink); font-weight: 600; }
.logout-btn {
  font-size: 13px; color: var(--ink-3); cursor: pointer;
  background: none; border: none; padding: 0; transition: color 0.15s; font-weight: 500;
}
.logout-btn:hover { color: var(--contradicted); }

/* ── Page info ── */
.page-card {
  background: #fff; border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; margin-bottom: 12px;
  box-shadow: var(--shadow);
}
.page-card-label { font-size: 12px; color: var(--ink-3); margin-bottom: 4px; }
.page-title-text {
  font-size: 14px; color: var(--ink); font-weight: 500; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
}
.chars-note { font-size: 12px; color: var(--ink-3); margin-bottom: 14px; }

/* ── Analyze button ── */
.btn-analyze {
  width: 100%; padding: 13px; font-size: 15px; font-weight: 600;
  background: var(--rausch); color: #fff; border: none;
  border-radius: 9999px; cursor: pointer; letter-spacing: 0;
  transition: background 0.15s;
}
.btn-analyze:hover:not(:disabled) { background: var(--rausch-active); }
.btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── Loading ── */
.status {
  font-size: 13px; color: var(--ink-3);
  padding: 10px 0; text-align: center; display: none;
}
.status.show { display: block; }
.status::after { content: ""; animation: dots 1.2s steps(4,end) infinite; }
@keyframes dots { 0%{content:""} 25%{content:"."} 50%{content:".."} 75%,100%{content:"..."} }

/* ── Result card ── */
.result-card {
  display: none; margin-top: 14px;
  background: #fff; border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; box-shadow: var(--shadow);
  animation: fadeUp 0.25s ease;
}
.result-card.show { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }

/* ── Metric row (gauge + label) ── */
.metric-section { padding: 14px 16px; border-bottom: 1px solid var(--border); }
.metric-section:last-child { border-bottom: none; }
.metric-header { font-size: 13px; color: var(--ink-3); margin-bottom: 10px; font-weight: 600; }
.metric-row { display: flex; align-items: center; gap: 14px; }
.mini-gauge { position: relative; width: 60px; height: 60px; flex-shrink: 0; }
.mini-gauge svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.gauge-bg { fill: none; stroke: var(--surface-2); stroke-width: 7; }
.gauge-fg {
  fill: none; stroke-width: 7; stroke-linecap: round;
  transition: stroke-dashoffset 1s cubic-bezier(0.25,0.46,0.45,0.94), stroke 0.4s;
}
.gauge-center {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.gauge-num { font-size: 18px; font-weight: 800; line-height: 1; }
.gauge-denom { font-size: 9px; color: var(--ink-3); }
.metric-info { flex: 1; min-width: 0; }
.metric-verdict { font-size: 15px; font-weight: 600; margin-bottom: 6px; line-height: 1.2; color: var(--ink); }
.metric-pill {
  display: inline-block; font-size: 11px; letter-spacing: 0;
  padding: 3px 10px; border-radius: 9999px; font-weight: 600;
}

/* ── Techniques ── */
.techniques-section { padding: 14px 16px; border-top: 1px solid var(--border); }
.section-label { font-size: 13px; color: var(--ink-3); font-weight: 600; margin-bottom: 10px; }
.tech-list { display: flex; flex-direction: column; gap: 6px; }
.tech-item {
  background: var(--surface); border-radius: 10px; padding: 9px 12px;
  display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
  border: 1px solid var(--border);
}
.tech-name { font-family: inherit; font-size: 12px; letter-spacing: 0; color: var(--ink); flex-shrink: 0; font-weight: 600; }
.tech-span { font-size: 12px; color: var(--ink-3); font-style: italic; text-align: right; max-width: 180px; line-height: 1.4; }

/* ── Narrative cluster ── */
.cluster-row {
  font-family: inherit; font-size: 12px; letter-spacing: 0;
  color: var(--ink-3); padding: 10px 16px; border-top: 1px solid var(--border);
}

/* ── Open full button ── */
.actions { padding: 14px 16px; border-top: 1px solid var(--border); }
.btn-open {
  width: 100%; padding: 11px; font-size: 14px; font-weight: 600;
  background: #fff; color: var(--ink); letter-spacing: 0;
  border: 1px solid var(--border-2); border-radius: 9999px;
  cursor: pointer; transition: all 0.15s;
}
.btn-open:hover { background: var(--surface); border-color: var(--ink-3); }

/* ── High-manipulation alert ── */
.conspiracy-note {
  font-size: 13px; color: var(--contradicted);
  background: #fbeaec; border: 1px solid rgba(155,28,46,0.2);
  padding: 9px 12px; border-radius: 10px; margin: 0 16px 14px; display: none;
  line-height: 1.5;
}
.conspiracy-note.show { display: block; }

/* ── Divider ── */
hr { border: none; border-top: 1px solid var(--border); margin: 0; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="brand">GKIN<span class="dot">.</span> <span class="brand-sub">Navigator</span></div>
  <div class="header-right">
    <button class="icon-btn" id="settings-toggle" title="Server settings">⚙</button>
  </div>
</div>

<!-- Server settings -->
<div class="settings-box" id="settings-box">
  <div class="field-label">Server URL</div>
  <input class="settings-input" type="text" id="server-url" placeholder="http://localhost:8000" />
  <div class="settings-row">
    <button class="btn-ghost" id="save-server">Save</button>
    <button class="btn-ghost" id="cancel-settings">Cancel</button>
  </div>
</div>

<!-- Auth section -->
<div class="section" id="auth-section">
  <div class="auth-label" id="auth-form-label">Sign in</div>

  <div id="login-form">
    <div class="auth-field">
      <input type="text" id="ext-username" placeholder="Username" autocomplete="username" />
    </div>
    <div class="auth-field">
      <input type="password" id="ext-password" placeholder="Password" autocomplete="current-password" />
    </div>
    <button class="btn-primary" id="ext-login-btn">Sign in</button>
    <div class="auth-switch">No account? <a id="show-register">Create one</a></div>
    <div class="auth-error" id="ext-login-error"></div>
  </div>

  <div id="register-form" style="display:none;">
    <div class="auth-field">
      <input type="text" id="ext-reg-username" placeholder="Username" autocomplete="username" />
    </div>
    <div class="auth-field">
      <input type="email" id="ext-reg-email" placeholder="Email" autocomplete="email" />
    </div>
    <div class="auth-field">
      <input type="password" id="ext-reg-password" placeholder="Password (min 6 chars)" autocomplete="new-password" />
    </div>
    <button class="btn-primary" id="ext-register-btn">Create account</button>
    <div class="auth-switch">Already have one? <a id="show-login">Sign in</a></div>
    <div class="auth-error" id="ext-reg-error"></div>
  </div>
</div>

<!-- Analyze section -->
<div class="section" id="analyze-section" style="display:none;">
  <div class="user-row">
    <div class="user-info">Signed in as <strong id="ext-username-display"></strong></div>
    <button class="logout-btn" id="ext-logout">Sign out</button>
  </div>

  <div class="page-card">
    <div class="page-card-label">Current page</div>
    <div class="page-title-text" id="page-title-text">Loading…</div>
  </div>
  <div class="chars-note" id="chars-note"></div>

  <button class="btn-analyze" id="analyze-btn">Analyze this article</button>
  <div class="status" id="status">Analyzing</div>

  <div class="result-card" id="result-card">

    <!-- Manipulation Index -->
    <div class="metric-section">
      <div class="metric-header">Manipulation index</div>
      <div class="metric-row">
        <div class="mini-gauge">
          <svg viewBox="0 0 64 64">
            <circle class="gauge-bg" cx="32" cy="32" r="26"/>
            <circle class="gauge-fg" id="g-manip" cx="32" cy="32" r="26" stroke-dasharray="163" stroke-dashoffset="163"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-num" id="manip-num">0</div>
            <div class="gauge-denom">/100</div>
          </div>
        </div>
        <div class="metric-info">
          <div class="metric-verdict" id="manip-verdict">—</div>
          <span class="metric-pill" id="manip-pill"></span>
        </div>
      </div>
    </div>

    <!-- Authenticity Rating -->
    <div class="metric-section">
      <div class="metric-header">Authenticity rating</div>
      <div class="metric-row">
        <div class="mini-gauge">
          <svg viewBox="0 0 64 64">
            <circle class="gauge-bg" cx="32" cy="32" r="26"/>
            <circle class="gauge-fg" id="g-trust" cx="32" cy="32" r="26" stroke-dasharray="163" stroke-dashoffset="163"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-num" id="trust-num">—</div>
            <div class="gauge-denom">/100</div>
          </div>
        </div>
        <div class="metric-info">
          <div class="metric-verdict" id="trust-verdict">—</div>
          <span class="metric-pill" id="trust-pill"></span>
        </div>
      </div>
    </div>

    <!-- AI Authorship -->
    <div class="metric-section">
      <div class="metric-header">AI authorship</div>
      <div class="metric-row">
        <div class="mini-gauge">
          <svg viewBox="0 0 64 64">
            <circle class="gauge-bg" cx="32" cy="32" r="26"/>
            <circle class="gauge-fg" id="g-ai" cx="32" cy="32" r="26" stroke-dasharray="163" stroke-dashoffset="163"/>
          </svg>
          <div class="gauge-center">
            <div class="gauge-num" id="ai-num">—</div>
            <div class="gauge-denom">/100</div>
          </div>
        </div>
        <div class="metric-info">
          <div class="metric-verdict" id="ai-verdict">—</div>
          <span class="metric-pill" id="ai-pill"></span>
        </div>
      </div>
    </div>

    <!-- Narrative cluster -->
    <div class="cluster-row" id="ext-cluster"></div>

    <!-- Techniques -->
    <div class="techniques-section">
      <div class="section-label">Persuasion techniques</div>
      <div class="tech-list" id="ext-techniques"></div>
    </div>

    <!-- High-manipulation alert -->
    <div class="conspiracy-note" id="ext-conspiracy-note">
      High manipulation detected. Try Speculative mode in the full app.
    </div>

    <!-- Open full -->
    <div class="actions">
      <button class="btn-open" id="open-full-btn">Open full analysis →</button>
    </div>

  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
